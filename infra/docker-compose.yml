# E2E storage backend fixtures for dash-forge.
#
# Brings up local stand-ins for the storage adapters under test:
#   - kubo:         IPFS node (write via API, read via gateway)
#   - minio:        S3-compatible object storage (+ one-shot bucket bootstrap)
#   - static-http:  plain HTTPS-style static file host (nginx)
#
# Usage: docker compose -f infra/docker-compose.yml up -d
#        docker compose -f infra/docker-compose.yml down -v

services:
  kubo:
    image: ipfs/kubo:latest
    container_name: forge-e2e-kubo
    restart: unless-stopped
    # Local-test node only: run with the DHT disabled and no public swarm so
    # content-addressed storage tests never announce or serve data to the public
    # IPFS network. Swarm port 4001 is intentionally NOT published. IPFS_PROFILE
    # 'server' disables local-network discovery; Routing.Type=none + empty Swarm
    # addresses keep it fully private. (Set via init profile + config on boot.)
    environment:
      IPFS_PROFILE: server
    ports:
      - "127.0.0.1:5001:5001" # HTTP API (localhost only)
      - "127.0.0.1:8081:8080" # Gateway (localhost only)
    volumes:
      - kubo-data:/data/ipfs
    entrypoint:
      - /bin/sh
      - -c
      - |
        ipfs init --profile server 2>/dev/null || true
        ipfs config Routing.Type none
        ipfs config --json Swarm.DisableNatPortMap true
        ipfs config --json Addresses.Swarm '[]'
        # Bind the RPC API + Gateway to 0.0.0.0 *inside the container* so the
        # published host ports (127.0.0.1:5001 / :8081) actually reach them.
        # The default 127.0.0.1 binding only accepts container-loopback traffic,
        # which Docker's port-forward (arriving on the bridge interface) can't hit.
        # Still safe: ports are published to host 127.0.0.1 only, and DHT/Swarm
        # are disabled, so nothing is exposed to the network.
        ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
        ipfs config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
        exec ipfs daemon --migrate=true --routing=none
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: forge-e2e-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    container_name: forge-e2e-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/forge-packs &&
      mc anonymous set public local/forge-packs &&
      echo 'forge-packs bucket ready'
      "
    restart: "no"

  static-http:
    image: nginx:alpine
    container_name: forge-e2e-static-http
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./static-fixtures:/usr/share/nginx/html:ro
      - ./nginx-static.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  kubo-data:
  minio-data:
