# nginx config for the `static-http` e2e fixture server.
#
# Serves ./infra/static-fixtures over plain HTTP with permissive CORS and
# byte-range support, so the HTTPS storage backend adapter can be exercised
# against a real static file host in e2e tests.

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Byte-range requests (resumable / partial downloads).
    autoindex     off;
    sendfile      on;
    default_type  application/octet-stream;

    location / {
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Accept-Ranges, Content-Range, Content-Length, ETag' always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
