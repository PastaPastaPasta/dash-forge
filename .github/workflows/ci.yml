name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Per-push gate: the web app + the TS FORGE_RULES_V1 conformance suite (the
# cross-client parity contract). The Rust workspace depends on the Dash Platform
# monorepo (path deps on ../platform) — building that 3 GB dependency tree does
# not fit a fast per-push job, so Rust is validated in `rust.yml` (nightly +
# manual, clones platform) and, authoritatively, locally + against testnet.
jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: forge-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
